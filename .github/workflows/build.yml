name: build

# Tag a release (vX.Y.Z) to build every target and publish the artifacts.
# Push / PR / manual runs build but don't publish — they prove the matrix stays green.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release on tag builds

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: x86_64, runner: ubuntu-22.04 }
          - { os: linux,   arch: arm64,  runner: ubuntu-22.04-arm }
          - { os: macos,   arch: arm64,  runner: macos-14 }
          - { os: windows, arch: x86_64, runner: windows-2022 }
          - { os: windows, arch: arm64,  runner: windows-2022 }
    steps:
      - uses: actions/checkout@v4

      # --- Linux: build inside the old-glibc container -----------------------
      - name: Build (linux)
        if: matrix.os == 'linux'
        run: |
          docker build -t tether-ffmpeg-linux -f docker/Dockerfile.linux .
          docker run --rm -v "$PWD:/src" -w /src tether-ffmpeg-linux \
            scripts/build-linux.sh ${{ matrix.arch }}

      # --- macOS: native build ----------------------------------------------
      - name: Build (macos)
        if: matrix.os == 'macos'
        run: |
          brew install nasm
          scripts/build-macos.sh ${{ matrix.arch }}

      # --- Windows: MSVC toolchain + MSYS2 build tools -----------------------
      - name: Set up MSVC (${{ matrix.arch }})
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'x86_64' && 'x64' || 'amd64_arm64' }}
      - name: Set up MSYS2
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: make nasm diffutils
      - name: Build (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: scripts/build-windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tether-ffmpeg-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
