name: build

# Tag a release (vX.Y.Z) to build every target and publish the artifacts.
# Push to main / PRs / manual runs build but don't publish — they keep the matrix green.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Least privilege by default. Only the release job elevates to contents: write;
# the build jobs run with a read-only token.
permissions:
  contents: read

# Cancel superseded PR runs to save runner minutes; let pushes to main and
# release tags always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120   # a cold FFmpeg + deps build is slow; well under the 6h default
    strategy:
      fail-fast: false     # one target failing shouldn't cancel the others
      matrix:
        include:
          - { os: linux,   arch: x86_64, runner: ubuntu-22.04 }
          - { os: linux,   arch: arm64,  runner: ubuntu-22.04-arm }
          - { os: macos,   arch: arm64,  runner: macos-14 }
          - { os: windows, arch: x86_64, runner: windows-2022 }
          - { os: windows, arch: arm64,  runner: windows-2022 }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # build jobs never push; don't leave the token in git config

      # --- Linux: build inside the old-glibc container -----------------------
      - name: Build (linux)
        if: matrix.os == 'linux'
        run: |
          docker build -t tether-ffmpeg-linux -f docker/Dockerfile.linux .
          docker run --rm -v "$PWD:/src" -w /src tether-ffmpeg-linux \
            scripts/build-linux.sh ${{ matrix.arch }}

      # --- macOS: native build ----------------------------------------------
      - name: Build (macos)
        if: matrix.os == 'macos'
        run: |
          brew install nasm
          scripts/build-macos.sh ${{ matrix.arch }}

      # --- Windows: MSVC toolchain + MSYS2 build tools -----------------------
      # NOTE: these third-party actions should be pinned to a commit SHA per
      # GitHub's security-hardening guidance before this repo cuts real
      # releases. Left on version tags in the scaffold rather than committing
      # guessed SHAs that would break CI.
      - name: Set up MSVC (${{ matrix.arch }})
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1   # TODO: pin to commit SHA
        with:
          arch: ${{ matrix.arch == 'x86_64' && 'x64' || 'amd64_arm64' }}
      - name: Set up MSYS2
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2     # TODO: pin to commit SHA
        with:
          msystem: MSYS
          install: make nasm diffutils
      - name: Build (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: scripts/build-windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tether-ffmpeg-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error   # a build that produced nothing is a failure, not a silent pass
          retention-days: 7

  release:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write   # elevated only here, to create the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Use the built-in gh CLI instead of a third-party release action — one
      # fewer supply-chain dependency, and it ships on the runner.
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --repo "${{ github.repository }}"
